name: 'Terraform Automation'

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to execute
        required: true
        default: destroy
        type: choice
        options:
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform Plan/Apply'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      TF_IN_AUTOMATION: true
      APP_NAME: ci-cd
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: SEU_AWS_ROLE_ARN
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name != 'workflow_dispatch'
        continue-on-error: true
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan > plan.txt 2>&1
          status=$?
          cat plan.txt
          {
            echo "exitcode=$status"
            echo 'stdout<<EOF'
            sed -n '1,200p' plan.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment Terraform Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const header = '## Terraform Plan';
            const outcome = process.env.PLAN_EXITCODE === '0' ? 'success' : 'failure';
            const body = `${header}

            Result: \`${outcome}\`

            <details><summary>Show plan output</summary>

            \`\`\`hcl
            ${process.env.PLAN_OUTPUT || 'No output captured'}
            \`\`\`

            </details>`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(header),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail When Plan Fails
        if: github.event_name != 'workflow_dispatch' && steps.plan.outputs.exitcode != '0'
        run: |
          echo "Terraform plan failed"
          exit 1

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy'
        run: terraform destroy -auto-approve -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false tfplan
